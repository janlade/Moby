<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Moby</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>

  <body>
    <div class="box-form">
      <div class="left">
        <div class="overlay">
        <h1>DHBW RideShare</h1>
        <p>Hello Moby! Use this awesome platform to find your next Ride to the DHBW and study like
          no one else. Happy riding!
        </p>
        <img src="../images/MOBY_ICON.png" alt="Moby Icon">
      </div>  
    </div>

    <div class="form signup">
        <div class="form-header">
          <div class="show-signup">Sign Up</div>
          <div class="show-signin">Sign In</div>
          <div class="show-reset">Reset</div>
        </div>
        <div class="arrow"></div>
        <div class="form-elements">
          <div class="form-element">
            <input type="text" placeholder="Username">
          </div>
          <div class="form-element">
            <input type="password" placeholder="Password">
          </div>
          <div class="form-element">
            <input type="password" placeholder="Confirm password">
          </div>
          <div class="form-element">
            <button id="submit-btn">Sign Up</button>
          </div>
        </div>
      </div>
  </body>
</html>
